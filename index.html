
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <div class="container">
        <header>
            <h1>Lotto Number Generator</h1>
            <button id="theme-switcher">Toggle Theme</button>
        </header>

        <div id="numbers-container" class="numbers-container">
            <!-- Generated numbers will appear here -->
        </div>

        <button id="generate-btn">Generate Numbers</button>

        <section id="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/{your_form_id}" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Inquiry</button>
            </form>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
